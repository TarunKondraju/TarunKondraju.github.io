# ============================================================
# PORTFOLIO CONFIGURATION
# ============================================================

site_name: "Dr Tarun Teja Kondraju"
site_description: "Personal Website of Tarun Kondraju — GIS, Remote Sensing, and Spatial Data Science Scientist"
site_author: "Tarun Kondraju"
# site_url: "https://TarunKondraju.github.io/TarunKondraju"

theme:
  name: material
  logo: assets/images/about.png  # This puts your picture in the top left!
  favicon: assets/images/about.png # This puts your picture in the browser tab!
  palette:
    - scheme: default            
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate              
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs            
    - navigation.top             
    - content.code.copy          
  font:
    text: Roboto
    code: Roboto Mono

extra_css:
  - assets/css/extra.css

markdown_extensions:
  - md_in_html        
  - attr_list         
  - admonition        
  - pymdownx.details  
  - pymdownx.superfences
  - tables
  - pymdownx.emoji:   
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

copyright: "Copyright &copy; Tarun Kondraju"

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/TarunKondraju
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/dr-tarun-kondraju-ph-d-99493372/
    - icon: material/email
      link: mailto:tarun.kondraju@gmail.com

plugins:
  - search
  - meta
  - mkdocs-jupyter

nav:
  - Home: index.md
  - Projects:
    - "All Projects": projects/index.md
    - "PAUDHA": projects/paudha.md
    - "VASUDHA": projects/vasudha.md
    - "PUSAMIA": projects/pusamia.md
    - "PUSA eCMS": projects/pusaecms.md
    - "FieldMapper": projects/fieldmapper.md
    - "EdgeProcessing": projects/edgeprocessing.md
    - "Civ 5 AI Advisor": projects/civ5-ai-advisor.md
  - Publications: publications.md
  - Experience: experience.md
  - Contact: contact.md
